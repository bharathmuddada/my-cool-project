<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #FFB6C1 0%, #87CEEB 50%, #DDA0DD 100%); 
      margin:0; 
      height:100vh; 
      display:flex; 
      justify-content:center; 
      align-items:center; 
      font-family:'Arial Black', sans-serif;
    }
    canvas { 
      display:block; 
      background:#FFF8DC; 
      border:8px solid #FF1493; 
      border-radius:15px;
      box-shadow: 0 0 30px rgba(255, 20, 147, 0.6), 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    canvas:hover {
      transform: scale(1.02);
    }
    #score { 
      position:absolute; 
      right:40px; 
      top:50%;
      transform:translateY(-50%);
      color:#FF1493; 
      font-size:48px; 
      font-weight:bold;
      text-shadow: 0 0 20px #FFB6C1, 0 0 40px #FF69B4, 2px 2px 4px rgba(0,0,0,0.2);
      letter-spacing:3px;
      animation: pulse 1s infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    #nameInputContainer {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:white;
      padding:40px;
      border-radius:15px;
      box-shadow: 0 0 30px rgba(255, 20, 147, 0.4);
      text-align:center;
      z-index:1000;
      animation: fadeIn 0.5s ease;
    }
    #nameInputContainer h2 {
      color:#FF1493;
      margin-bottom:20px;
      font-size:24px;
    }
    #nameInputContainer input {
      padding:12px 15px;
      font-size:18px;
      border:3px solid #FF1493;
      border-radius:8px;
      width:250px;
      margin-right:10px;
    }
    #nameInputContainer button {
      padding:12px 30px;
      font-size:16px;
      background:#FF1493;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      transition: background 0.3s;
    }
    #nameInputContainer button:hover {
      background:#FF69B4;
    }
    #gameOverScreen {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:200;
    }
    #gameOverContent {
      background:linear-gradient(135deg, #FFB6C1 0%, #DDA0DD 100%);
      padding:60px 40px;
      border-radius:20px;
      text-align:center;
      box-shadow: 0 0 50px rgba(255, 20, 147, 0.6);
      animation: fadeIn 0.5s ease;
    }
    #gameOverContent h1 {
      color:#FF1493;
      font-size:48px;
      margin:20px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    #gameOverContent p {
      color:#333;
      font-size:32px;
      margin:20px 0;
      font-weight:bold;
    }
    #gameOverContent button {
      padding:15px 40px;
      font-size:18px;
      background:#FF1493;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      margin-top:30px;
      transition: background 0.3s;
    }
    #gameOverContent button:hover {
      background:#FF69B4;
    }
    #controls {
      position:absolute;
      bottom:10px;
      display:none;
      flex-direction:column;
      gap:8px;
      justify-content:center;
      align-items:center;
      width:100%;
      z-index:50;
    }
    .btn-arrow {
      width:60px;
      height:60px;
      border:none;
      border-radius:10px;
      background:#FF1493;
      color:white;
      font-size:24px;
      cursor:pointer;
      font-weight:bold;
      transition: background 0.2s;
    }
    .btn-arrow:active {
      background:#FF69B4;
      transform: scale(0.95);
    }
    @media (max-width: 1024px) {
      canvas {
        width:90vw;
        height:90vw;
        max-width:600px;
        max-height:600px;
        border:6px solid #FF1493;
      }
      #score {
        font-size:24px;
        right:auto;
        left:20px;
        top:auto;
        bottom:190px;
        transform:none;
      }
      #title {
        font-size:22px;
      }
      #controls {
        display:flex;
      }
      .btn-arrow {
        width:55px;
        height:55px;
        font-size:20px;
      }
    }
    @media (max-width: 768px) {
      body {
        height:100vh;
      }
      canvas {
        width:85vw;
        height:85vw;
        max-width:400px;
        max-height:400px;
        border:5px solid #FF1493;
      }
      #score {
        font-size:20px;
        right:15px;
        top:auto;
        bottom:280px;
      }
      #title {
        top:15px;
        font-size:18px;
      }
      #nameInputContainer {
        padding:30px 20px;
      }
      #nameInputContainer input {
        width:200px;
        font-size:16px;
      }
      .btn-arrow {
        width:50px;
        height:50px;
        font-size:20px;
      }
    }
    @media (max-width: 480px) {
      canvas {
        width:80vw;
        height:80vw;
        border:4px solid #FF1493;
      }
      #score {
        font-size:18px;
        bottom:240px;
      }
      #title {
        font-size:16px;
      }
      #nameInputContainer {
        padding:25px 15px;
      }
      #nameInputContainer h2 {
        font-size:18px;
      }
      #nameInputContainer input {
        width:150px;
        padding:8px 10px;
        font-size:14px;
      }
      .btn-arrow {
        width:45px;
        height:45px;
        font-size:18px;
      }
    }
    #title {
      position:absolute;
      top:50px;
      left:50%;
      transform:translateX(-50%);
      color:#FF1493;
      font-size:28px;
      white-space:nowrap;
      text-shadow: 0 0 20px #FFB6C1, 2px 2px 4px rgba(0,0,0,0.2);
      letter-spacing:2px;
    }
  </style>
</head>
<body>
<div id="nameInputContainer">
  <h2>🐍 Enter Your Name 🐍</h2>
  <input type="text" id="playerName" placeholder="Enter your name" />
  <button onclick="startGame()">START GAME</button>
</div>
<div id="gameOverScreen">
  <div id="gameOverContent">
    <h1>🎮 GAME OVER 🎮</h1>
    <p id="finalMessage"></p>
    <button onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>
<div id="title">🐍 SNAKE GAME 🍎</div>
<div id="score">Score: 0</div>
<canvas id="game" width="800" height="800"></canvas>
<div id="controls">
  <div style="display:flex;justify-content:center;width:100%;">
    <button class="btn-arrow" onclick="moveUp()">⬆️</button>
  </div>
  <div style="display:flex;justify-content:center;gap:5px;width:100%;">
    <button class="btn-arrow" onclick="moveLeft()">⬅️</button>
    <button class="btn-arrow" onclick="moveDown()">⬇️</button>
    <button class="btn-arrow" onclick="moveRight()">➡️</button>
  </div>
</div>
<script src="snake.js"></script>
</body>
</html>
